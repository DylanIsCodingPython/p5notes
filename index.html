<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Notes Library</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Google+Sans+Flex:opsz,wght@6..144,400;6..144,500;6..144,700;6..144,900&family=Roboto:wght@400;500;700;900&display=swap" rel="stylesheet">
<style>
:root{--primary:#6750A4;--on-primary:#fff;--primary-container:#EADDFF;--on-primary-container:#21005D;
--secondary-container:#E8DEF8;--on-secondary-container:#1D192B;--tertiary-container:#FFD8E4;--on-tertiary-container:#31111D;
--success-container:#C6F0D2;--on-success-container:#08351A;--warning-container:#FDE7B3;--on-warning-container:#3B2A00;--info-container:#CFE5FF;--on-info-container:#001D36;
--surface:#FEF7FF;--surface-container:#F3EDF7;--surface-container-high:#ECE6F0;--on-surface:#1D1B20;--on-surface-variant:#49454F;--outline:#CAC4D0;--tertiary:#7D5260;--xl:28px;--lg:20px;--full:999px;}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:"Google Sans Flex","Google Sans","Roboto",-apple-system,Arial,sans-serif;color:var(--on-surface);background:var(--surface);line-height:1.5;}
#gate{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;padding:20px;background:var(--surface);z-index:1000;}
.login-card{background:var(--primary-container);color:var(--on-primary-container);border-radius:var(--xl);padding:34px 32px;width:100%;max-width:360px;text-align:center;}
.login-card .lock{font-size:40px;margin-bottom:10px;}.login-card h2{font-size:22px;font-weight:900;margin-bottom:6px;}
.login-card p{font-size:13.5px;opacity:.85;margin-bottom:20px;}
.login-card input{width:100%;font-family:inherit;font-size:15px;padding:13px 16px;margin-bottom:12px;border:none;border-radius:var(--full);background:#fff;color:var(--on-surface);}
.login-card button{width:100%;font-family:inherit;font-size:15px;font-weight:700;padding:13px 16px;border:none;border-radius:var(--full);background:var(--primary);color:var(--on-primary);cursor:pointer;}
.err{font-size:13px;font-weight:700;color:#B3261E;min-height:18px;margin-bottom:8px;}
#app{display:none;max-width:1040px;margin:0 auto;padding:36px 28px 60px;}
.hero{background:var(--primary-container);color:var(--on-primary-container);border-radius:var(--xl);padding:30px 34px;margin-bottom:22px;display:flex;justify-content:space-between;align-items:center;gap:16px;flex-wrap:wrap;}
.hero .eyebrow{display:inline-block;background:var(--primary);color:var(--on-primary);font-size:12px;font-weight:700;letter-spacing:.6px;padding:6px 16px;border-radius:var(--full);margin-bottom:12px;}
.hero h1{font-size:30px;font-weight:900;letter-spacing:-.5px;}
.btn{font-family:inherit;font-size:14px;font-weight:700;padding:11px 20px;border:none;border-radius:var(--full);cursor:pointer;background:var(--primary);color:var(--on-primary);}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(250px,1fr));gap:18px;}
.note-card{border-radius:var(--xl);padding:24px;cursor:pointer;min-height:180px;display:flex;flex-direction:column;transition:transform .18s,box-shadow .18s;}
.note-card:hover{transform:translateY(-4px);box-shadow:0 10px 24px rgba(0,0,0,.14);}
.note-card .ic{width:50px;height:50px;border-radius:var(--lg);display:flex;align-items:center;justify-content:center;font-size:25px;background:rgba(255,255,255,.55);margin-bottom:14px;}
.note-card h3{font-size:18px;font-weight:800;margin-bottom:6px;}
.note-card p{font-size:13px;opacity:.85;flex-grow:1;}
.note-card .tg{align-self:flex-start;margin-top:12px;font-size:12px;font-weight:700;padding:5px 14px;border-radius:var(--full);background:rgba(0,0,0,.10);}
.cc0{background:var(--secondary-container);color:var(--on-secondary-container);}
.cc1{background:var(--tertiary-container);color:var(--on-tertiary-container);}
.cc2{background:var(--info-container);color:var(--on-info-container);}
.cc3{background:var(--success-container);color:var(--on-success-container);}
.cc4{background:var(--warning-container);color:var(--on-warning-container);}
.note-card.soon{background:var(--surface-container);color:var(--on-surface-variant);border:2px dashed var(--outline);}
.note-card.soon .ic{background:var(--surface-container-high);}
.note-card.creator{background:var(--primary);color:var(--on-primary);border:none;}
.note-card.creator .ic{background:rgba(255,255,255,.22);}
.note-card.creator .tg{background:rgba(255,255,255,.22);}
#detail{display:none;}
.back{background:var(--secondary-container);color:var(--on-secondary-container);margin-bottom:18px;}
.detail-body{background:#fff;border-radius:var(--xl);padding:24px 26px;}
h2.dt{font-size:26px;font-weight:900;margin-bottom:4px;letter-spacing:-.3px;}
.delnote{background:var(--tertiary-container);color:var(--on-tertiary-container);margin-left:8px;}
/* note content */
.n-big{background:var(--warning-container);color:var(--on-warning-container);border-radius:var(--lg);padding:16px 20px;margin:14px 0;font-size:15px;}
.n-cols{display:flex;gap:14px;margin:14px 0;flex-wrap:wrap;}
.n-card2,.n-card3{flex:1;min-width:220px;border-radius:var(--xl);padding:20px 22px;}
.n-card2{background:var(--secondary-container);color:var(--on-secondary-container);}
.n-card3{background:var(--tertiary-container);color:var(--on-tertiary-container);}
.n-card2 h3,.n-card3 h3{font-size:17px;font-weight:800;margin-bottom:6px;}
.n-card2 ul,.n-card3 ul{margin-left:18px;}.n-card2 li,.n-card3 li{margin-bottom:5px;font-size:14px;}
.n-title{display:inline-block;font-size:15px;font-weight:800;padding:9px 18px;border-radius:var(--full);margin:20px 0 10px;color:#fff;}
.tp{background:var(--primary);}.ts{background:var(--on-secondary-container);}.tt{background:var(--tertiary);}
.n-steps{background:var(--surface-container);border-radius:var(--lg);padding:16px 20px 16px 18px;counter-reset:s;list-style:none;}
.n-steps li{position:relative;padding:8px 0 8px 42px;font-size:14.5px;border-bottom:1px solid var(--outline);}
.n-steps li:last-child{border-bottom:none;}
.n-steps li::before{counter-increment:s;content:counter(s);position:absolute;left:0;top:7px;width:28px;height:28px;background:var(--primary);color:#fff;border-radius:var(--full);font-weight:800;font-size:13px;display:flex;align-items:center;justify-content:center;}
.n-flow{text-align:center;font-size:15px;font-weight:800;background:var(--primary-container);color:var(--on-primary-container);border-radius:var(--full);padding:14px 18px;margin:16px 0;}
.n-chips{display:flex;flex-wrap:wrap;gap:9px;}
.n-chips span{background:var(--surface-container-high);color:var(--on-surface-variant);border:1.5px solid var(--outline);border-radius:var(--full);padding:7px 16px;font-size:13.5px;font-weight:600;}
.n-qa{background:var(--surface-container);border-radius:var(--lg);padding:13px 18px;margin:9px 0;font-size:14.5px;}
.n-qa b{color:var(--primary);display:block;margin-bottom:4px;font-weight:800;}
/* modal */
#modal{position:fixed;inset:0;background:rgba(0,0,0,.4);display:none;align-items:center;justify-content:center;padding:20px;z-index:900;}
.editor{background:var(--surface);border-radius:var(--xl);padding:26px;width:100%;max-width:520px;}
.editor h2{font-size:20px;font-weight:800;margin-bottom:4px;}
.editor .hint{font-size:12.5px;color:var(--on-surface-variant);margin-bottom:16px;}
.editor label{font-size:12.5px;font-weight:700;color:var(--on-surface-variant);display:block;margin:10px 2px 4px;}
.editor input{width:100%;font-family:inherit;font-size:15px;padding:12px 15px;border:1.5px solid var(--outline);border-radius:var(--lg);background:#fff;color:var(--on-surface);}
.editor .actions{display:flex;justify-content:space-between;align-items:center;gap:10px;margin-top:18px;}
.status{font-size:13px;font-weight:700;min-height:18px;}
.link{background:none;border:none;color:var(--on-surface-variant);font-size:12px;text-decoration:underline;cursor:pointer;padding:0;}
</style>
</head>
<body>

<div id="gate"><div class="login-card">
  <div class="lock">🔒</div><h2>My Notes Library</h2>
  <p>Enter your password to unlock your notes.</p>
  <div class="err" id="err"></div>
  <input type="password" id="pw" placeholder="Password" autofocus>
  <button id="unlockBtn">Unlock</button>
</div></div>

<div id="app">
  <div id="library">
    <div class="hero">
      <div><span class="eyebrow">MY NOTES LIBRARY</span><h1>Study Notes &amp; Cheatsheets 📚</h1></div>
      <button class="btn" id="exportBtn">⬇ Export website</button>
    </div>
    <div class="grid" id="grid"></div>
  </div>
  <div id="detail">
    <button class="btn back" id="backBtn">← Back to library</button>
    <div class="detail-body" id="detailBody"></div>
  </div>
</div>

<div id="modal"><div class="editor">
  <h2>✨ Generate a note with Claude</h2>
  <div class="hint">Type a topic and Claude writes the note. Your API key stays in this browser only and is never included when you export.</div>
  <label>TOPIC</label>
  <input type="text" id="topic" placeholder="e.g. The respiratory system (Primary 5)">
  <label>YOUR CLAUDE API KEY</label>
  <input type="password" id="apikey" placeholder="sk-ant-...">
  <label>MODEL</label>
  <input type="text" id="model" value="claude-sonnet-5">
  <div class="actions">
    <button class="link" id="forgetKey">Forget saved key</button>
    <div style="display:flex;gap:10px;">
      <button class="btn back" id="cancelBtn">Cancel</button>
      <button class="btn" id="genBtn">Generate</button>
    </div>
  </div>
  <div class="status" id="status" style="margin-top:12px;"></div>
</div></div>

const COMING = [{"emoji":"🫁","title":"Respiratory System","summary":"Breathing, oxygen & carbon dioxide, and why breathing speeds up during exercise."}];
const ADDED_KEY = 'mynotes_added_v1';
const APIKEY_KEY = 'claude_api_key_v1';
let KEY=null, BAKED=[], NOTES=[];
const PRISTINE='<!DOCTYPE html>\n'+document.documentElement.outerHTML;

function fromB64(s){const b=atob(s);const u=new Uint8Array(b.length);for(let i=0;i<b.length;i++)u[i]=b.charCodeAt(i);return u;}
function toB64(buf){let s='';const u=new Uint8Array(buf);for(let i=0;i<u.length;i++)s+=String.fromCharCode(u[i]);return btoa(s);}
function esc(s){return (s||'').replace(/[&<>]/g,function(c){return {'&':'&amp;','<':'&lt;','>':'&gt;'}[c];});}
function $(id){return document.getElementById(id);}

async function deriveKey(pw){
  const base=await crypto.subtle.importKey('raw',new TextEncoder().encode(pw),'PBKDF2',false,['deriveKey']);
  return crypto.subtle.deriveKey({name:'PBKDF2',salt:fromB64(CFG.salt),iterations:CFG.iter,hash:'SHA-256'},base,{name:'AES-GCM',length:256},false,['encrypt','decrypt']);
}
async function encObj(obj){
  const iv=crypto.getRandomValues(new Uint8Array(12));
  const ct=await crypto.subtle.encrypt({name:'AES-GCM',iv},KEY,new TextEncoder().encode(JSON.stringify(obj)));
  return {iv:toB64(iv),ct:toB64(ct)};
}
async function decObj(blob){
  const plain=await crypto.subtle.decrypt({name:'AES-GCM',iv:fromB64(blob.iv)},KEY,fromB64(blob.ct));
  return JSON.parse(new TextDecoder().decode(plain));
}

async function unlock(){
  const pw=$('pw').value;const err=$('err');err.textContent='';
  try{
    KEY=await deriveKey(pw);
    const v=new TextDecoder().decode(await crypto.subtle.decrypt({name:'AES-GCM',iv:fromB64(CFG.vIv)},KEY,fromB64(CFG.vCt)));
    if(v!=='VERIFIED')throw 0;
    BAKED=JSON.parse(new TextDecoder().decode(await crypto.subtle.decrypt({name:'AES-GCM',iv:fromB64(CFG.nIv)},KEY,fromB64(CFG.nCt))));
    await loadAdded();
    $('gate').style.display='none';$('app').style.display='block';
    renderLibrary();
  }catch(e){KEY=null;err.textContent='Incorrect password.';$('pw').value='';}
}

async function loadAdded(){
  NOTES=BAKED.slice();
  const raw=localStorage.getItem(ADDED_KEY);
  if(raw){
    try{
      const added=await decObj(JSON.parse(raw));
      const ids={};NOTES.forEach(function(n){ids[n.id]=1;});
      added.forEach(function(n){ if(!ids[n.id]) NOTES.push(n); });
    }catch(e){}
  }
}
async function saveAdded(){
  const added=NOTES.filter(function(n){ return !BAKED.some(function(b){return b.id===n.id;}); });
  localStorage.setItem(ADDED_KEY, JSON.stringify(await encObj(added)));
}

function renderLibrary(){
  $('detail').style.display='none';$('library').style.display='block';
  var real=NOTES.map(function(n,i){return '<div class="note-card cc'+(i%5)+'" data-i="'+i+'">'+
    '<div class="ic">'+(n.emoji||'📄')+'</div><h3>'+esc(n.title)+'</h3>'+
    '<p>'+esc(n.summary||'')+'</p><span class="tg">'+esc(n.tag||'Note')+' →</span></div>';}).join('');
  var soon=COMING.map(function(c){return '<div class="note-card soon" data-topic="'+esc(c.title)+'">'+
    '<div class="ic">'+(c.emoji||'⏳')+'</div><h3>'+esc(c.title)+'</h3>'+
    '<p>'+esc(c.summary||'')+'</p><span class="tg">Tap to generate ✨</span></div>';}).join('');
  var creator='<div class="note-card creator" id="creatorCard">'+
    '<div class="ic">✨</div><h3>Add a new topic</h3>'+
    '<p>Type any topic and Claude writes the note, added right here.</p>'+
    '<span class="tg">＋ New note</span></div>';
  $('grid').innerHTML=real+soon+creator;
}

function openNote(i){
  var n=NOTES[i];var isAdded=!BAKED.some(function(b){return b.id===n.id;});
  $('detailBody').innerHTML='<h2 class="dt">'+(n.emoji||'')+' '+esc(n.title)+'</h2>'+n.body+
    (isAdded?'<div style="margin-top:20px;"><button class="btn delnote" data-del="'+n.id+'">🗑 Delete this note</button></div>':'');
  $('library').style.display='none';$('detail').style.display='block';window.scrollTo(0,0);
}
async function delNote(id){
  if(!confirm('Delete this note?'))return;
  NOTES=NOTES.filter(function(n){return n.id!==id;});
  await saveAdded();renderLibrary();
}

/* ---- AI generation ---- */
function openGen(topic){
  $('topic').value=topic||'';
  var savedKey=localStorage.getItem(APIKEY_KEY)||'';
  $('apikey').value=savedKey;
  $('status').textContent='';$('status').style.color='';
  $('modal').style.display='flex';
  $((topic?'apikey':'topic')).focus();
}
function closeGen(){$('modal').style.display='none';}

function buildPrompt(topic){
  return [
    'Write a study note for a Primary 5 (age 10-11) student on this topic: "'+topic+'".',
    'Return ONLY a JSON object (no markdown, no code fences) with these exact fields:',
    '{"title": short title, "emoji": one relevant emoji, "tag": e.g. "Science \u00b7 P5", "summary": one-sentence description, "body": HTML string}',
    'The "body" HTML must be kid-friendly and may ONLY use these CSS classes for styling:',
    '- <div class="n-big"> for a highlighted Big Idea box',
    '- <div class="n-cols"> containing two <div class="n-card2"> and/or <div class="n-card3"> comparison cards (each with an <h3> and a <ul>)',
    '- <div class="n-title tp"> or "n-title ts" or "n-title tt" for coloured section headers',
    '- <ol class="n-steps"> with <li> items for numbered steps',
    '- <div class="n-flow"> for a short arrow-flow summary line',
    '- <div class="n-chips"> containing <span> keyword chips',
    '- <div class="n-qa"> each with a <b>Q: ...</b> then a <div> answer, for practice questions',
    'Use <b> for bold. Keep it accurate, simple, and encouraging. Output the JSON only.'
  ].join('\n');
}

async function generate(){
  var topic=$('topic').value.trim();
  var apikey=$('apikey').value.trim();
  var model=$('model').value.trim();
  var st=$('status');
  if(!topic){st.style.color='#B3261E';st.textContent='Please enter a topic.';return;}
  if(!apikey){st.style.color='#B3261E';st.textContent='Please enter your Claude API key.';return;}
  localStorage.setItem(APIKEY_KEY,apikey);
  st.style.color='var(--on-surface-variant)';st.textContent='Asking Claude to write your note…';
  $('genBtn').disabled=true;
  try{
    var res=await fetch('https://api.anthropic.com/v1/messages',{
      method:'POST',
      headers:{
        'content-type':'application/json',
        'x-api-key':apikey,
        'anthropic-version':'2023-06-01',
        'anthropic-dangerous-direct-browser-access':'true'
      },
      body:JSON.stringify({model:model,max_tokens:3000,messages:[{role:'user',content:buildPrompt(topic)}]})
    });
    if(!res.ok){var t=await res.text();throw new Error('API '+res.status+': '+t.slice(0,180));}
    var data=await res.json();
    var text=(data.content&&data.content[0]&&data.content[0].text)||'';
    text=text.replace(/^\s*```(json)?/i,'').replace(/```\s*$/,'').trim();
    var note=JSON.parse(text);
    note.id='n'+Date.now();
    NOTES.push(note);
    await saveAdded();
    closeGen();renderLibrary();
  }catch(e){
    st.style.color='#B3261E';
    st.textContent='Could not generate: '+e.message+' (check your key / model name; note: browser API calls need a paid key and may be blocked by the API).';
  }finally{$('genBtn').disabled=false;}
}

/* ---- export whole site with all current notes baked in ---- */
async function exportSite(){
  var iv=crypto.getRandomValues(new Uint8Array(12));
  var ct=await crypto.subtle.encrypt({name:'AES-GCM',iv},KEY,new TextEncoder().encode(JSON.stringify(NOTES)));
  var newCFG=Object.assign({},CFG,{nIv:toB64(iv),nCt:toB64(ct)});
  var oldStr='const CFG = '+JSON.stringify(CFG)+';';
  var newStr='const CFG = '+JSON.stringify(newCFG)+';';
  var out=PRISTINE.replace(oldStr,newStr);
  var blob=new Blob([out],{type:'text/html'});
  var a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='index.html';a.click();
}

/* wire up */
$('unlockBtn').addEventListener('click',unlock);
$('pw').addEventListener('keydown',function(e){if(e.key==='Enter')unlock();});
$('backBtn').addEventListener('click',renderLibrary);
$('exportBtn').addEventListener('click',exportSite);
$('cancelBtn').addEventListener('click',closeGen);
$('genBtn').addEventListener('click',generate);
$('forgetKey').addEventListener('click',function(){localStorage.removeItem(APIKEY_KEY);$('apikey').value='';$('status').style.color='var(--on-surface-variant)';$('status').textContent='Saved key forgotten.';});
$('grid').addEventListener('click',function(e){
  var creator=e.target.closest('#creatorCard'); if(creator){openGen('');return;}
  var soon=e.target.closest('[data-topic]'); if(soon){openGen(soon.getAttribute('data-topic'));return;}
  var c=e.target.closest('[data-i]'); if(c){openNote(parseInt(c.getAttribute('data-i')));}
});
$('detailBody').addEventListener('click',function(e){
  var d=e.target.getAttribute('data-del'); if(d)delNote(d);
});
</script>
